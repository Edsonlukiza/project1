[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps =
    bodmer/TFT_eSPI @ ^2.5.43
    links2004/WebSockets @ ^2.4.1
    bblanchon/ArduinoJson @ ^6.21.0
build_flags =
  -D USER_SETUP_LOADED=1
  -D ILI9341_DRIVER=1
  -D TFT_CS=15
  -D TFT_DC=2
  -D TFT_RST=4
  -D TFT_MOSI=23
  -D TFT_SCLK=18